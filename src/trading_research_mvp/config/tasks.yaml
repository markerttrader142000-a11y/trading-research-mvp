# ============================================================
# tasks.yaml — Trading Research MVP
# Formato oficial CrewAI (CrewBase + YAML)
# ============================================================

# ─── Crew 1: Research Synthesizer ───────────────────────────

research_macro_task:
  description: >
    Research the following asset and provide macro context, key catalysts,
    upcoming events and sentiment summary.

    Asset brief:
    {candidate_brief}

    IMPORTANT: Respond ONLY with a valid JSON object. No prose outside the JSON.
    Required keys: macro_summary (string), bullish_factors (list of strings),
    bearish_factors (list of strings), catalysts (list of strings),
    macro_events (list of strings), news_risks (list of strings),
    sources (list of strings), source_quality_score (float 0.0-1.0).
  expected_output: >
    A JSON object, e.g.: {"macro_summary": "...", "bullish_factors": [...],
    "bearish_factors": [...], "catalysts": [...], "macro_events": [...],
    "news_risks": [...], "sources": [...], "source_quality_score": 0.75}
  agent: macro_research_analyst

research_context_task:
  description: >
    Analyse the market structure, session context and volatility regime
    for the following candidate.

    Asset brief:
    {candidate_brief}

    Use the macro research from the previous task as context.
  expected_output: >
    A brief market context note covering: session timing, volatility,
    technical structure and any execution-relevant observations.
  agent: market_context_analyst
  context:
    - research_macro_task

research_contrarian_task:
  description: >
    Challenge the research for this candidate and identify the top 2-4 risks
    and reasons NOT to trade it.

    Asset brief:
    {candidate_brief}
  expected_output: >
    A list of 2-4 specific reasons why this trade could fail, including hidden
    risks, false-signal scenarios and timing concerns.
  agent: contrarian_checker
  context:
    - research_macro_task
    - research_context_task

# ─── Crew 1b: Specialist Tasks (GPT-4.1-nano) ────────────────

sentiment_scoring_task:
  description: >
    Score the market sentiment for this asset using the research context below.

    Asset brief:
    {candidate_brief}

    Respond ONLY with a valid JSON object.
    Required keys: sentiment_score (float -1.0 to +1.0),
    sentiment_label (string: "bearish" / "neutral" / "bullish" / "strongly_bullish" / "strongly_bearish"),
    justification (string, one sentence).
  expected_output: >
    JSON: {"sentiment_score": 0.3, "sentiment_label": "bullish", "justification": "..."}
  agent: sentiment_scorer
  context:
    - research_macro_task

news_impact_task:
  description: >
    Assess the price impact of news catalysts for this asset.

    Asset brief:
    {candidate_brief}

    Respond ONLY with a valid JSON object.
    Required keys: catalysts_assessed (list of {catalyst, impact, bias}),
    overall_impact ("HIGH" / "MEDIUM" / "LOW"),
    directional_bias ("bullish" / "bearish" / "neutral"),
    impact_summary (string, one sentence).
  expected_output: >
    JSON: {"catalysts_assessed": [...], "overall_impact": "MEDIUM",
    "directional_bias": "bullish", "impact_summary": "..."}
  agent: news_impact_assessor
  context:
    - research_macro_task
    - sentiment_scoring_task

technical_validation_task:
  description: >
    Validate the technical structure for this asset's signal.

    Asset brief:
    {candidate_brief}

    Check: trend alignment, key levels, volatility regime, momentum.
    Respond ONLY with a valid JSON object.
    Required keys: structure_valid (bool), alignment_score (float 0.0-1.0),
    key_levels (list of strings), technical_notes (string).
  expected_output: >
    JSON: {"structure_valid": true, "alignment_score": 0.75,
    "key_levels": ["1.1650 support", "1.1720 resistance"],
    "technical_notes": "..."}
  agent: technical_validator
  context:
    - research_macro_task
    - sentiment_scoring_task

# ─── Crew 2: Setup Validation ────────────────────────────────

validation_task:
  description: >
    Validate this trade setup against the strategy checklist.

    Setup brief:
    {setup_brief}

    Checklist: trigger defined, context aligned, invalidation clear,
    R:R >= 1.5, no conflicting news, timing acceptable.
  expected_output: >
    VALIDATED or REJECTED with specific reasons. If rejected, list exact
    checklist items that failed.
  agent: setup_validator

scoring_task:
  description: >
    Score the probability of success for this setup (0.0–1.0).

    Setup brief:
    {setup_brief}
  expected_output: >
    A probability score between 0.0 and 1.0 with a one-sentence justification.
  agent: probability_scorer
  context:
    - validation_task

risk_annotation_task:
  description: >
    Write 2-4 specific, actionable risk notes for this setup.

    Setup brief:
    {setup_brief}
  expected_output: >
    A list of 2-4 specific, actionable risk notes the trader must be aware of.
  agent: risk_annotation_agent
  context:
    - validation_task
    - scoring_task

# ─── Crew 3: Trade Plan ──────────────────────────────────────

trade_plan_task:
  description: >
    Build a complete trade plan for this validated setup.

    Research brief:
    {research_brief}

    IMPORTANT: Respond ONLY with a valid JSON object. No prose outside the JSON.
    Required keys: direction (long/short/neutral), setup_type (string),
    thesis (string), counter_thesis (string), entry_logic (string),
    stop_logic (string), target_logic (string),
    invalidation_conditions (list of strings), confidence_initial (float 0.0-1.0).
    Minimum R:R must be 1.5. No vague entries allowed.
  expected_output: >
    A JSON object with the complete trade plan.
  agent: trade_planner

sizing_task:
  description: >
    Suggest a theoretical position size for this plan.

    Research brief:
    {research_brief}
  expected_output: >
    A sizing recommendation: small/medium/large relative to account risk,
    with a one-sentence justification. NOT a final size — advisory only.
  agent: position_sizing_assistant
  context:
    - trade_plan_task

formatting_task:
  description: >
    Format the trade plan as a clean execution payload for the broker connector.
    Asset: {asset}, Market: {market}.

    NOTE: execution_enabled is always false. This payload is for human review only.
  expected_output: >
    A structured payload summary: order_type, direction, entry_zone, stop_zone,
    target_zone, ttl_hours, tags.
  agent: execution_instruction_formatter
  context:
    - trade_plan_task
    - sizing_task

# ─── Crew 4: Execution Monitor ───────────────────────────────

monitoring_task:
  description: >
    Review the following open positions and recommend actions.

    Open positions:
    {open_positions}

    For each position, assess: should we hold, adjust stop, take partial,
    or flag for immediate human review?
    NOTE: No orders are sent automatically. All actions require human approval.
  expected_output: >
    A list of actions, one per position: {asset, action, reason, requires_human_review}.
  agent: trade_monitor

exception_task:
  description: >
    Check for any operational anomalies in the current positions.

    Open positions:
    {open_positions}
  expected_output: >
    A list of detected issues and proposed resolutions, or "No exceptions detected."
  agent: exception_handler
  context:
    - monitoring_task

# ─── Crew 5: Post-Trade Review ───────────────────────────────

journal_task:
  description: >
    Write a complete post-trade journal entry for this closed trade.

    Closed trade data:
    {closed_trade}

    Cover: original thesis, actual execution, deviations from plan,
    outcome, what went right, what went wrong, improvement suggestions.
  expected_output: >
    A structured journal entry with: asset, outcome, journal (narrative),
    lessons (list), patterns (list), memory_update (string).
  agent: journal_writer

pattern_task:
  description: >
    Analyse this closed trade for patterns to feed into the memory layer.

    Closed trade data:
    {closed_trade}
  expected_output: >
    A brief pattern analysis: setup type performance, timing observations,
    regime context, and 1-2 actionable rules to reinforce or avoid.
  agent: pattern_miner
  context:
    - journal_task
