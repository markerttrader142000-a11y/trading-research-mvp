macro_research_task:
  description: >
    Research the macro environment for {asset} on the {market} market.
    The scanner identified this asset with reason: {reason}.
    Scanner metrics: {metrics}

    Provide a 2-3 sentence macro summary that references specific price-action
    data (move_pct, range_pct) when available. Identify the top 2-3 macro
    catalysts and risks.
  expected_output: >
    A structured macro research summary with:
    - macro_summary: 2-3 sentences citing specific metrics
    - bullish_factors: list of 2-3 bullish macro factors
    - bearish_factors: list of 2-3 bearish macro factors
  agent: macro_research_analyst

market_context_task:
  description: >
    Analyse the technical market context for {asset}.
    Scanner data: {metrics}
    Reason selected: {reason}

    Identify the primary catalysts driving the move and assess the quality
    of the setup based on the scanner metrics provided.
  expected_output: >
    A structured market context analysis with:
    - catalysts: list of 2-3 specific catalysts
    - source_quality_score: float 0.0-1.0 rating research quality
    - setup_notes: brief technical context
  agent: market_context_analyst

contrarian_check_task:
  description: >
    Review the research on {asset} and identify the strongest counter-arguments.
    Consider macro, technical, and timing risks.

    What would invalidate the bullish/bearish thesis?
    What tail risks are being ignored?
  expected_output: >
    A contrarian assessment with:
    - counter_thesis: 1-2 sentences on the main counter-argument
    - invalidation_conditions: list of 2-3 specific conditions that would invalidate
    - tail_risks: list of 1-2 tail risks
  agent: contrarian_checker
